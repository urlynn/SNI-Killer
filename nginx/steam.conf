# ==================== 上游服务器定义 ====================

upstream steam_store {
    server 23.1.179.144:443;
    server 184.30.30.155:443;
    server 23.1.172.140:443;
    server 23.212.168.138:443 backup;
    least_conn;
}

upstream steam_api {
    server 23.1.179.144:443;
    server 184.30.30.155:443;
    least_conn;
}

upstream steam_chat {
    server 23.1.172.140:443;
}

map $host $steam_backend {
    hostnames;
    default                     steam_store;

    store.steampowered.com      steam_store;
    checkout.steampowered.com   steam_store;
    steamcommunity.com          steam_store;
    help.steampowered.com       steam_store;

    api.steampowered.com        steam_api;
    partner.steamgames.com      steam_api;

    steam-chat.com              steam_chat;
}

# ==================== Server 块 ====================

server {
    listen 443 ssl;
    http2 on;

    server_name
        store.steampowered.com
        checkout.steampowered.com
        steamcommunity.com
        api.steampowered.com
        partner.steamgames.com
        help.steampowered.com
        steam-chat.com;

    ssl_certificate /etc/nginx/ca/steam/steam_ecc.crt;
    ssl_certificate_key /etc/nginx/ca/steam/steam_ecc.key;
    ssl_protocols TLSv1.3;
    client_header_buffer_size 16k;
    large_client_header_buffers 4 16k;

    location / {
        proxy_pass https://$steam_backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffer_size 16k;
        proxy_buffers 16 256k;
        proxy_busy_buffers_size 512k;
        proxy_ssl_session_reuse on;
    }
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name
        store.steampowered.com
        checkout.steampowered.com
        steamcommunity.com
        api.steampowered.com
        partner.steamgames.com
        help.steampowered.com
        steam-chat.com;

    return 301 https://$host$request_uri;
}
