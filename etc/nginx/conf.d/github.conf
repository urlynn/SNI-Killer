    server 103.62.33.24:443;
    server 103.62.33.29:443;
    server 185.64.143.24:443 backup;
    server 185.64.143.29:443 backup;
    least_conn;
}

upstream cloudflare {
    server 1.0.0.1:443;
}

map $host $backend {
    hostnames;
    default                             cloudflare;

    github.com                          github_com;
    api.github.com                      api_github_com;
    codeload.github.com                 codeload_github_com;
    uploads.github.com                  uploads_github_com;
    gist.github.com                     gist_github_com;
    viewscreen.githubusercontent.com    viewscreen_github_com;

    raw.githubusercontent.com           githubusercontent;
    raw.github.com                      githubusercontent;
    camo.githubusercontent.com          githubusercontent;
    cloud.githubusercontent.com         githubusercontent;
    avatars.githubusercontent.com       githubusercontent;
    avatars0.githubusercontent.com      githubusercontent;
    avatars1.githubusercontent.com      githubusercontent;
    avatars2.githubusercontent.com      githubusercontent;
    avatars3.githubusercontent.com      githubusercontent;
    user-images.githubusercontent.com   githubusercontent;
    private-user-images.githubusercontent.com githubusercontent;
    desktop.githubusercontent.com        githubusercontent;
    github-releases.githubusercontent.com githubusercontent;
    release-assets.githubusercontent.com  githubusercontent;
    objects.githubusercontent.com        githubusercontent;
    media.githubusercontent.com          githubusercontent;

    github.githubassets.com             githubassets;
    docs.github.com                     docs_github_com;

    assets-cdn.github.com               assets_cdn;

    github.blog                         github_blog;
}

server {
    listen 443 ssl;
    http2 on;

    server_name
        github.com
        api.github.com
        codeload.github.com
        gist.github.com
        viewscreen.githubusercontent.com
        raw.githubusercontent.com
        raw.github.com
        camo.githubusercontent.com
        cloud.githubusercontent.com
        avatars.githubusercontent.com
        avatars0.githubusercontent.com
        avatars1.githubusercontent.com
        avatars2.githubusercontent.com
        avatars3.githubusercontent.com
        user-images.githubusercontent.com
        private-user-images.githubusercontent.com
        analytics.githubassets.com
        desktop.githubusercontent.com
        github-releases.githubusercontent.com
        release-assets.githubusercontent.com
        objects.githubusercontent.com
        media.githubusercontent.com
        github.githubassets.com
        docs.github.com
        assets-cdn.github.com
        github.blog;

    ssl_certificate /etc/nginx/ca/github/github_ecc.crt;
    ssl_certificate_key /etc/nginx/ca/github/github_ecc.key;
    ssl_protocols TLSv1.3;
    client_header_buffer_size 16k;
    large_client_header_buffers 4 16k;

    location / {
        proxy_pass https://$backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffer_size 16k;
        proxy_buffers 16 256k;
        proxy_busy_buffers_size 512k;
        proxy_ssl_session_reuse on;
        proxy_buffering off;
        proxy_next_upstream error timeout http_429;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Content-Security-Policy;
        proxy_hide_header X-WebKit-CSP;
    }
}

server {
    listen 443 ssl;
    server_name uploads.github.com;

    ssl_certificate /etc/nginx/ca/github/github_ecc.crt;
    ssl_certificate_key /etc/nginx/ca/github/github_ecc.key;

    location / {
        proxy_pass https://uploads_github_com;
        proxy_set_header Host uploads.github.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 256m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}

server {
    listen 80;
    server_name
        github.com
        api.github.com
        codeload.github.com
        gist.github.com
        uploads.github.com
        viewscreen.githubusercontent.com
        raw.githubusercontent.com
        github.githubassets.com
        docs.github.com
        assets-cdn.github.com
        github.blog;

    return 301 https://$host$request_uri;
}
